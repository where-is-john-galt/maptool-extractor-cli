# Publishes to npm on every push to main: runs tests, bumps patch version, publishes,
# then commits the version bump and tag (commit message contains [skip ci] so this workflow does not re-run).
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   NPM_TOKEN — npm access token with "Automation" (classic) or publish permission (granular).

name: Publish npm package

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-npm-main
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance

      - name: Commit version bump and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"
